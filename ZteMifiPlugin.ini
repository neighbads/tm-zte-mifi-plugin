[General]
; ZTE 设备 IP 地址
DeviceIP=192.168.0.1
; 数据更新间隔（毫秒）
UpdateInterval=1000
; 调试日志开关（0=关闭, 1=开启，日志文件: ZteMifiPlugin.log）
Debug=0

[Items]
; 显示项目开关（1=启用, 0=禁用）
; 运营商（中国电信✔ / 中国电信×）
Operator=1
; 信号强度（▂▄▆█ / ××××）
SignalStrength=1
; 运营商+信号（中国电信 ▂▄▆█）
OperatorWithSignal=1
; 上传下载速度（5G ↑: 14.3 KB/s ↓: 56.7 KB/s）
UpDownSpeed=1
; 上传速度（5G ↑: 14.3 KB/s）
UploadSpeed=1
; 下载速度（5G ↓: 56.7 KB/s）
DownloadSpeed=1
